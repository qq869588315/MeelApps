<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">Agents Memory context profiles preview</title>
  <desc id="desc">Preview of lean, normal, and deep context profiles for agents-memory</desc>
  <rect width="1440" height="900" fill="#f8fafc"/>
  <rect x="90" y="84" width="1260" height="732" rx="30" fill="#ffffff" stroke="#dbe3ef" stroke-width="3"/>
  <text x="150" y="158" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700" fill="#0f172a">Context Profiles</text>
  <text x="150" y="207" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#475569">Choose the right memory pack for the task in front of the agent.</text>
  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="150" y="280" width="330" height="370" rx="24" fill="#ecfeff" stroke="#67e8f9" stroke-width="2"/>
    <text x="190" y="345" font-size="34" font-weight="700" fill="#0e7490">lean</text>
    <text x="190" y="395" font-size="22" fill="#155e75">Fast handoff</text>
    <text x="190" y="462" font-size="20" fill="#334155">- Active tasks</text>
    <text x="190" y="510" font-size="20" fill="#334155">- Project rules</text>
    <text x="190" y="558" font-size="20" fill="#334155">- Compact search hits</text>
    <rect x="190" y="590" width="210" height="18" rx="9" fill="#0891b2"/>
    <rect x="190" y="620" width="130" height="18" rx="9" fill="#67e8f9"/>
    <rect x="555" y="280" width="330" height="370" rx="24" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
    <text x="595" y="345" font-size="34" font-weight="700" fill="#15803d">normal</text>
    <text x="595" y="395" font-size="22" fill="#166534">Daily work</text>
    <text x="595" y="462" font-size="20" fill="#334155">- Session state</text>
    <text x="595" y="510" font-size="20" fill="#334155">- Warm memory</text>
    <text x="595" y="558" font-size="20" fill="#334155">- Balanced budget</text>
    <rect x="595" y="590" width="240" height="18" rx="9" fill="#16a34a"/>
    <rect x="595" y="620" width="190" height="18" rx="9" fill="#86efac"/>
    <rect x="960" y="280" width="330" height="370" rx="24" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="2"/>
    <text x="1000" y="345" font-size="34" font-weight="700" fill="#6d28d9">deep</text>
    <text x="1000" y="395" font-size="22" fill="#5b21b6">Full history</text>
    <text x="1000" y="462" font-size="20" fill="#334155">- Rich context</text>
    <text x="1000" y="510" font-size="20" fill="#334155">- Longer memory</text>
    <text x="1000" y="558" font-size="20" fill="#334155">- Complex tasks</text>
    <rect x="1000" y="590" width="250" height="18" rx="9" fill="#7c3aed"/>
    <rect x="1000" y="620" width="230" height="18" rx="9" fill="#c4b5fd"/>
  </g>
  <rect x="150" y="710" width="1140" height="54" rx="18" fill="#0f172a"/>
  <text x="190" y="746" font-family="Cascadia Mono, Consolas, monospace" font-size="22" fill="#e2e8f0">am get-context --project meelapps --query "resume deploy" --profile normal</text>
</svg>
